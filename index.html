<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="login-page" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-white p-8 rounded-lg shadow-xl w-96 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="Logo" class="w-16 mx-auto mb-4">
            <h2 class="text-2xl font-bold mb-2">Github Issue Tracker</h2>
            <p class="text-gray-500 mb-6">Sign in to manage issues</p>
            
            <input id="username" type="text" placeholder="Username" class="input input-bordered w-full mb-3" />
            <input id="password" type="password" placeholder="Password" class="input input-bordered w-full mb-4" />
            
            <button onclick="handleLogin()" class="btn btn-primary w-full text-white">Sign In</button>
            <p class="mt-4 text-xs text-gray-400">Demo: admin / admin123</p>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="bg-white shadow-md py-4 px-10 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-xl font-bold">IssueTracker</h1>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search by title..." class="input input-bordered input-sm w-64" onkeyup="handleSearch()"/>
                <button class="btn btn-sm btn-neutral">Search</button>
            </div>
        </nav>

        <div class="container mx-auto p-6">
            <div role="tablist" class="tabs tabs-boxed mb-8 max-w-md mx-auto">
                <a role="tab" class="tab tab-active" onclick="filterData('All', this)">All</a>
                <a role="tab" class="tab" onclick="filterData('Open', this)">Open</a>
                <a role="tab" class="tab" onclick="filterData('Closed', this)">Closed</a>
            </div>

            <div id="loading" class="hidden text-center my-20">
                <span class="loading loading-spinner loading-lg text-primary"></span>
            </div>

            <div id="issue-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </div>
    </div>

    <dialog id="issue_modal" class="modal">
      <div class="modal-box w-11/22 max-w-2xl">
        <div id="modal-content"></div>
        <div class="modal-action">
          <form method="dialog">
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
