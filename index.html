<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC]">

    <div id="login-page" class="flex items-center justify-center h-screen bg-[#0D1117]">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-6">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">GitHub Issue Tracker</h2>
            <p class="text-slate-500 mb-8">Sign in to manage your project issues</p>
            <div class="space-y-4 text-left">
                <input id="username" type="text" placeholder="Username (admin)" class="input input-bordered w-full" />
                <input id="password" type="password" placeholder="Password (admin123)" class="input input-bordered w-full" />
                <button onclick="handleLogin()" class="btn bg-[#24292F] hover:bg-black border-none text-white w-full py-3 rounded-lg mt-2">Sign In</button>
            </div>
            <p class="mt-4 text-xs text-gray-400">Credentials: admin / admin123</p>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="bg-white border-b border-slate-200 py-4 px-10 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-8 h-8" alt="Logo">
                <h1 class="text-lg font-bold text-slate-800">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2">
                <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered input-sm w-64" onkeyup="handleSearch()"/>
            </div>
        </nav>

        <main class="container mx-auto p-6 md:p-10">
            <div class="flex justify-start mb-6 border-b border-slate-200">
                <div role="tablist" class="tabs tabs-boxed bg-slate-100 p-1 mb-2">
                    <a role="tab" class="tab tab-active px-8 font-bold" onclick="filterData('All', this)">All</a>
                    <a role="tab" class="tab px-8 font-bold" onclick="filterData('Open', this)">Open</a>
                    <a role="tab" class="tab px-8 font-bold" onclick="filterData('Closed', this)">Closed</a>
                </div>
            </div>

            <div class="bg-[#FFF4E5] rounded-xl p-8 mb-10 flex items-center gap-6 border border-[#FFE7C4]">
                <div class="w-16 h-16 bg-[#24292F] rounded-full flex items-center justify-center shadow-md">
                   <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png" class="w-10 h-10 invert" alt="Icon">
                </div>
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-800" id="issue-count">0 Issues</h2>
                    <p class="text-slate-600 mt-1 font-medium italic">Track and manage your project issues</p>
                </div>
            </div>

            <div id="loading" class="hidden text-center my-20">
                <span class="loading loading-spinner loading-lg text-blue-600"></span>
            </div>

            <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 items-stretch"></div>
        </main>
    </div>

    <dialog id="issue_modal" class="modal">
      <div class="modal-box rounded-2xl max-w-2xl border-t-8 border-[#24292F]">
        <div id="modal-content"></div>
        <div class="modal-action">
          <form method="dialog"><button class="btn btn-neutral">Close</button></form>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
