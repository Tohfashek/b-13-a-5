<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issue Tracker - Figma Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">

    <div id="login-page" class="flex items-center justify-center h-screen bg-slate-900">
        <div class="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-xl mx-auto mb-6 flex items-center justify-center shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            </div>
            <h2 class="text-3xl font-bold text-slate-800 mb-2">Issue Tracker</h2>
            <p class="text-slate-500 mb-8">Sign in to manage your GitHub issues</p>
            
            <div class="space-y-4">
                <input id="username" type="text" placeholder="Username" class="input input-bordered w-full bg-slate-50 border-slate-200 focus:border-blue-500" />
                <input id="password" type="password" placeholder="Password" class="input input-bordered w-full bg-slate-50 border-slate-200 focus:border-blue-500" />
                <button onclick="handleLogin()" class="btn bg-blue-600 hover:bg-blue-700 border-none text-white w-full py-4 rounded-xl shadow-md transition-all">Sign In</button>
            </div>
            <p class="mt-6 text-sm text-slate-400">Demo: <span class="font-mono text-blue-500">admin</span> / <span class="font-mono text-blue-500">admin123</span></p>
        </div>
    </div>

    <div id="main-page" class="hidden">
        <nav class="bg-white border-b border-slate-200 py-4 px-6 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">I</div>
                <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">IssueTracker</h1>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative w-full">
                    <input id="search-input" type="text" placeholder="Search issues..." class="input input-bordered input-sm w-full md:w-80 pl-10 h-10 rounded-lg" onkeyup="handleSearch()"/>
                    <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </nav>

        <main class="container mx-auto p-6 md:p-10">
            <div class="flex flex-col md:flex-row justify-between items-end mb-10 border-b border-slate-200 pb-6 gap-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800" id="issue-count">0 Issues</h2>
                    <p class="text-slate-500 text-sm">Track and manage your project issues</p>
                </div>
                <div role="tablist" class="tabs tabs-boxed bg-slate-200 p-1 rounded-xl">
                    <a role="tab" class="tab tab-active transition-all duration-300 font-semibold" onclick="filterData('All', this)">All</a>
                    <a role="tab" class="tab font-semibold" onclick="filterData('Open', this)">Open</a>
                    <a role="tab" class="tab font-semibold" onclick="filterData('Closed', this)">Closed</a>
                </div>
            </div>

            <div id="loading" class="hidden text-center my-32">
                <span class="loading loading-dots loading-lg text-blue-600"></span>
            </div>

            <div id="issue-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-stretch">
                </div>
        </main>
    </div>

    <dialog id="issue_modal" class="modal">
      <div class="modal-box rounded-2xl shadow-2xl p-8 max-w-2xl border-t-8 border-blue-600">
        <div id="modal-content"></div>
        <div class="modal-action mt-8">
          <form method="dialog">
            <button class="btn btn-neutral rounded-lg px-8">Close Details</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script.js"></script>
</body>
</html>
